<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobi's - Kanban Board</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: #f8f9fa;
            --text-primary: #333;
            --text-secondary: #666;
            --text-muted: #999;
            --accent: #667eea;
            --accent-hover: #764ba2;
            --border: #e0e0e0;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --overlay-bg: rgba(0,0,0,0.5);
            --modal-bg: #fff;
        }

        body.dark-mode {
            --card-bg: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --text-muted: #888;
            --border: #333;
            --accent: #8b9bff;
            --accent-hover: #a08bff;
            --overlay-bg: rgba(255,255,255,0.1);
            --modal-bg: #2d2d2d;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg-gradient); min-height: 100vh; padding: 20px; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto 20px;
        }
        
        h1 { color: #fff; font-size: 2.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        
        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .filter-select {
            padding: 10px 15px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
        }
        
        .filter-select option {
            background: #333;
            color: #fff;
        }
        
        .settings-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            padding: 10px 12px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        
        .settings-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: rotate(30deg);
        }
        
        .board { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; max-width: 1400px; margin: 0 auto; }
        .column { background: var(--card-bg); border-radius: 12px; min-width: 300px; max-width: 350px; flex: 1; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        body.dark-mode .column { box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        
        .column-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 3px solid; }
        .column:nth-child(1) .column-header { border-color: var(--danger); }
        .column:nth-child(2) .column-header { border-color: var(--warning); }
        .column:nth-child(3) .column-header { border-color: var(--success); }
        .column-header h2 { font-size: 1.3rem; color: var(--text-primary); }
        .task-count { background: var(--accent); color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; }
        
        .task-list { min-height: 400px; display: flex; flex-direction: column; gap: 12px; }
        
        .task { background: var(--modal-bg); padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: grab; transition: all 0.3s ease; border-left: 4px solid; position: relative; }
        .task:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
        .task.dragging { opacity: 0.5; transform: rotate(3deg); }
        .task.overdue { border: 2px solid var(--danger); }
        body.dark-mode .task { border-color: var(--border); }
        body.dark-mode .task:hover { border-color: var(--accent); }
        
        .task-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
        .task-icon { font-size: 1.5rem; flex-shrink: 0; }
        .task-content { flex: 1; }
        .task-category { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; margin-bottom: 5px; text-transform: uppercase; }
        .category-haushalt { background: #e74c3c; color: #fff; }
        .category-einkauf { background: #3498db; color: #fff; }
        .category-pflege { background: #9b59b6; color: #fff; }
        .category-fahrrad { background: #27ae60; color: #fff; }
        .category-auto { background: #f39c12; color: #fff; }
        .category-reisen { background: #1abc9c; color: #fff; }
        
        .task h3 { color: var(--text-primary); font-size: 1rem; margin-bottom: 5px; }
        .task p { color: var(--text-secondary); font-size: 0.85rem; }
        
        .task-meta { display: flex; gap: 10px; margin-top: 10px; font-size: 0.75rem; color: var(--text-muted); flex-wrap: wrap; align-items: center; }
        .task-meta span { display: flex; align-items: center; gap: 3px; }
        .task-meta .assignee-tag { 
            display: inline-flex; 
            align-items: center; 
            gap: 4px; 
            padding: 2px 8px; 
            border-radius: 12px; 
            font-size: 0.75rem;
            color: #fff;
        }
        
        .task-due-date {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            background: #f0f0f0;
            color: #666;
        }
        
        .task-due-date.overdue {
            background: var(--danger);
            color: #fff;
        }
        
        .task-due-date.soon {
            background: var(--warning);
            color: #fff;
        }
        
        body.dark-mode .task-due-date { background: #3a3a3a; color: #ccc; }
        body.dark-mode .task-due-date.overdue { background: #c0392b; }
        body.dark-mode .task-due-date.soon { background: #d35400; }
        
        .task-actions { display: none; position: absolute; top: 10px; right: 10px; gap: 5px; }
        .task:hover .task-actions { display: flex; }
        .task-btn { background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px; padding: 5px 8px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
        .task-btn:hover { background: var(--accent); color: #fff; }
        .task-btn.delete:hover { background: var(--danger); border-color: var(--danger); }
        
        .add-task-btn { background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 0.9rem; font-weight: 600; transition: transform 0.2s; margin-top: 10px; }
        .add-task-btn:hover { transform: scale(1.02); background: var(--accent-hover); }
        
        .drag-over { background: rgba(102, 126, 234, 0.2); }
        
        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay-bg); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--modal-bg); border-radius: 12px; padding: 25px; width: 90%; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        body.dark-mode .modal { border: 1px solid var(--border); }
        .modal h2 { margin-bottom: 20px; color: var(--text-primary); display: flex; align-items: center; gap: 10px; }
        .modal h3 { margin: 20px 0 10px; color: var(--text-primary); font-size: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: var(--text-secondary); }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; transition: border-color 0.3s; background: var(--modal-bg); color: var(--text-primary); }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
        .form-group input[type="date"] { cursor: pointer; }
        
        .form-group textarea { resize: vertical; min-height: 80px; }
        
        .icon-picker { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; border: 2px solid var(--border); border-radius: 8px; max-height: 150px; overflow-y: auto; }
        .icon-picker label { padding: 8px 12px; border: 2px solid transparent; border-radius: 6px; cursor: pointer; font-size: 1.3rem; transition: all 0.2s; }
        .icon-picker label:hover { background: var(--accent); color: #fff; }
        .icon-picker input[type="radio"] { display: none; }
        .icon-picker input[type="radio"]:checked + label { background: var(--accent); border-color: var(--accent); color: #fff; }
        
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .modal-actions button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        .modal-actions button:hover { transform: scale(1.02); }
        .btn-save { background: var(--accent); color: #fff; }
        .btn-cancel { background: var(--border); color: var(--text-primary); }
        .btn-delete { background: var(--danger); color: #fff; }
        
        /* Settings Modal Specific */
        .settings-section { margin-bottom: 20px; }
        .settings-section h3 { margin-bottom: 10px; }
        
        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .toggle-label { font-weight: 600; color: var(--text-primary); }
        
        .toggle-switch { position: relative; width: 50px; height: 26px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; transition: 0.4s; border-radius: 26px; }
        .toggle-slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background: white; transition: 0.4s; border-radius: 50%; }
        input:checked + .toggle-slider { background: var(--accent); }
        input:checked + .toggle-slider:before { transform: translateX(24px); }
        
        /* Member Editor */
        .member-list { display: flex; flex-direction: column; gap: 8px; }
        .member-item { display: flex; align-items: center; gap: 10px; padding: 8px; background: var(--card-bg); border-radius: 6px; border: 1px solid var(--border); }
        .member-color { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; }
        .member-name { flex: 1; font-weight: 600; color: var(--text-primary); }
        .member-delete { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.2rem; padding: 5px; }
        .member-delete:hover { transform: scale(1.2); }
        
        .add-member-row { display: flex; gap: 10px; margin-top: 10px; }
        .add-member-row input[type="color"] { width: 40px; height: 40px; border: none; cursor: pointer; border-radius: 6px; }
        .add-member-row input[type="text"] { flex: 1; }
        .add-member-row button { padding: 8px 16px; background: var(--success); color: #fff; border: none; border-radius: 6px; cursor: pointer; }
        
        .settings-actions { display: flex; gap: 10px; margin-top: 20px; }
        .settings-actions button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .settings-actions .btn-reset { background: var(--danger); color: #fff; }
        .settings-actions .btn-save-settings { background: var(--success); color: #fff; }
        
        @media (max-width: 768px) { 
            .header { flex-wrap: wrap; gap: 10px; }
            .board { flex-direction: column; align-items: center; } 
            .column { width: 100%; max-width: 400px; } 
            .modal { width: 95%; }
        }
        .footer { text-align: center; color: rgba(255,255,255,0.7); margin-top: 30px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Haushalts-Kanban Board v3</h1>
        <div class="header-controls">
            <select class="filter-select" id="filterSelect" onchange="applyFilter()">
                <option value="all">Alle Aufgaben</option>
                <option value="me">Meine Aufgaben</option>
                <option value="unassigned">Nicht zugewiesen</option>
            </select>
            <button class="settings-btn" onclick="openSettingsModal()" title="Einstellungen">⚙️</button>
        </div>
    </div>
    
    <div class="board">
        <div class="column" id="todo">
            <div class="column-header"><h2>To Do</h2><span class="task-count" id="todo-count">0</span></div>
            <div class="task-list" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'todo')" ondragleave="handleDragLeave(event)"></div>
            <button class="add-task-btn" onclick="addTask('todo')">+ Aufgabe hinzufügen</button>
        </div>
        <div class="column" id="inprogress">
            <div class="column-header"><h2>In Progress</h2><span class="task-count" id="inprogress-count">0</span></div>
            <div class="task-list" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'inprogress')" ondragleave="handleDragLeave(event)"></div>
            <button class="add-task-btn" onclick="addTask('inprogress')">+ Aufgabe hinzufügen</button>
        </div>
        <div class="column" id="done">
            <div class="column-header"><h2>Done</h2><span class="task-count" id="done-count">0</span></div>
            <div class="task-list" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'done')" ondragleave="handleDragLeave(event)"></div>
            <button class="add-task-btn" onclick="addTask('done')">+ Aufgabe hinzufügen</button>
        </div>
    </div>
    <div class="footer">Kanban Board v3 - Settings, Fälligkeitsdatum & Filter</div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h2>✏️ Aufgabe bearbeiten</h2>
            <form id="editForm">
                <input type="hidden" id="editTaskId">
                <input type="hidden" id="editColumn">
                <div class="form-group">
                    <label for="editTitle">Titel</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-group">
                    <label for="editDescription">Beschreibung</label>
                    <textarea id="editDescription"></textarea>
                </div>
                <div class="form-group">
                    <label for="editDueDate">Fälligkeitsdatum</label>
                    <input type="date" id="editDueDate">
                </div>
                <div class="form-group">
                    <label for="editAssignee">Zugewiesen an</label>
                    <select id="editAssignee">
                        <option value="">Niemand</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editCategory">Kategorie</label>
                    <select id="editCategory">
                        <option value="haushalt">Haushalt</option>
                        <option value="einkauf">Einkauf</option>
                        <option value="pflege">Pflege</option>
                        <option value="fahrrad">Fahrrad</option>
                        <option value="auto">Auto</option>
                        <option value="reisen">Reisen</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Icon</label>
                    <div class="icon-picker" id="editIconPicker"></div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-delete" onclick="deleteCurrentTask()">🗑️ Löschen</button>
                    <button type="button" class="btn-cancel" onclick="closeModal()">Abbrechen</button>
                    <button type="submit" class="btn-save">💾 Speichern</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>⚙️ Einstellungen</h2>
            
            <div class="settings-section">
                <h3>👁️ Darstellung</h3>
                <div class="toggle-row">
                    <span class="toggle-label">🌙 Dark Mode</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
            
            <div class="settings-section">
                <h3>👥 Mitglieder verwalten</h3>
                <div class="member-list" id="memberList"></div>
                <div class="add-member-row">
                    <input type="color" id="newMemberColor" value="#667eea">
                    <input type="text" id="newMemberName" placeholder="Neuer Name...">
                    <button onclick="addNewMember()">+ Hinzufügen</button>
                </div>
            </div>
            
            <div class="settings-actions">
                <button class="btn-reset" onclick="resetSettings()">🔄 Zurücksetzen</button>
                <button class="btn-save-settings" onclick="saveSettings()">💾 Speichern</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // KONSTANTEN & KONFIGURATION
        // ============================================================
        
        const ICONS = [
            // Haushalt & Reinigung
            '🧹', '🧺', '🧽', '🧴', '🧻', '🪣', '🧼', '🧷',
            // Essen & Küche
            '🍽️', '🍳', '🧇', '🍕', '🍜', '🍲', '🍱', '🫕',
            // Einkauf & Pakete
            '🛒', '📦', '📫', '📮', '📬', '🏪', '🛍️',
            // Kleidung & Wäsche
            '👕', '👗', '👟', '🧦', '🧤', '🧣', '🧥',
            // Garten & Draußen
            '🌱', '🌿', '🌻', '🌹', '🌺', '🌵', '🌲', '🪴', '🌾',
            '🏕️', '⛺', '🚲', '🏃', '⚽', '🎾',
            // Büro & Technik
            '💻', '📱', '⌨️', '🖱️', '📊', '📝', '📋', '📁', '🗂️',
            // Fahrzeuge
            '🚗', '🏎️', '🚕', '🚌', '🚑', '🚒', '🚐', '🛻',
            '🏍️', '🚨', '⛽', '🅿️', '🛣️',
            // Flug & Reisen
            '✈️', '🛫', '🛬', '🛩️', '🎢', '🗽', '🏖️', '🗺️',
            '🚁', '🪂', '🧗', '🎿', '🏂', '🏊',
            // Wassersport
            '🏄', '🏊', '🚤', '⛵', '🛶', '🐟', '🐬', '🦈',
            '🏋️', '🧘', '🧗', '🚴',
            // Reise & Gepäck
            '🎒', '🧳', '📍', '🗺️', '🧭', '🔭',
            // BMW & Auto
            '🚘', '🔧', '⚙️', '🔩',
            // Wetter & Klima
            '🌡️', '💨', '❄️', '☀️', '🌧️', '⛈️', '🌈', '🌤️',
            // Kategorien
            '📅', '⭐', '🔔', '🎯', '✅', '⏳', '🚧', '❗', '💡',
            '🔒', '🔑', '🏠', '🏢', '🏥', '🏫', '🎓', '💼',
            '🎨', '🎵', '🎬', '📷', '🎮', '🕹️', '🧩', '🎲',
            '💊', '🩺', '🩹', '🧠', '❤️', '💪', '🙏', '🤝'
        ];

        // Standard-Mitglieder mit Farben
        let ASSIGNEES = [
            { name: 'Max', color: '#e74c3c' },
            { name: 'Anna', color: '#3498db' },
            { name: 'Tom', color: '#27ae60' },
            { name: 'Lisa', color: '#9b59b6' },
            { name: 'Familie', color: '#f39c12' },
            { name: 'Gemeinsam', color: '#1abc9c' }
        ];

        let currentFilter = 'all';
        let isDarkMode = false;

        // ============================================================
        // DATEN & LOGIK
        // ============================================================

        const tasksData = {
            todo: [
                { id: 1, category: 'haushalt', title: 'Wohnzimmer staubsaugen', description: 'Alle Böden + unter Möbel', assignee: 'Max', icon: '🧹', dueDate: '2026-07-15' },
                { id: 2, category: 'einkauf', title: 'Lebensmittel einkaufen', description: 'Milch, Brot, Gemüse, Obst', assignee: 'Anna', icon: '🛒', dueDate: '2026-07-13' },
                { id: 3, category: 'pflege', title: 'Wäsche waschen', description: 'Weiße + Buntwäsche trennen', assignee: 'Max', icon: '👕', dueDate: '' },
                { id: 4, category: 'fahrrad', title: 'Fahrrad reparieren', description: 'Bremsen einstellen', assignee: 'Tom', icon: '🔧', dueDate: '2026-07-18' }
            ],
            inprogress: [
                { id: 5, category: 'haushalt', title: 'Küche putzen', description: 'Oberflächen + Herd reinigen', assignee: 'Anna', icon: '🍽️', dueDate: '' },
                { id: 6, category: 'einkauf', title: 'Drogerieartikel', description: 'Shampoo, Seife, Putzmittel', assignee: 'Max', icon: '🧴', dueDate: '2026-07-11' }
            ],
            done: [
                { id: 7, category: 'haushalt', title: 'Müll rausbringen', description: 'Restmüll + Recycling', assignee: 'Tom', icon: '🚮', dueDate: '2026-07-10' },
                { id: 8, category: 'pflege', title: 'Geschirr spülen', description: 'Im Geschirrspüler einräumen', assignee: 'Anna', icon: '🧽', dueDate: '' }
            ]
        };

        let draggedItem = null;

        // ============================================================
        // ICON PICKER
        // ============================================================

        function buildIconPicker() {
            const picker = document.getElementById('editIconPicker');
            picker.innerHTML = '';
            ICONS.forEach((icon, i) => {
                picker.innerHTML += `<input type="radio" name="taskIcon" id="icon-${i}" value="${icon}"><label for="icon-${i}">${icon}</label>`;
            });
        }

        // ============================================================
        // ASSIGNEE SELECT (Dynamisch aus Settings)
        // ============================================================

        function buildAssigneeSelect() {
            const sel = document.getElementById('editAssignee');
            sel.innerHTML = '<option value="">Niemand</option>';
            ASSIGNEES.forEach(member => {
                sel.innerHTML += `<option value="${member.name}">${member.name}</option>`;
            });
            
            // Update filter select
            const filterSel = document.getElementById('filterSelect');
            // Keep "Alle" and "Meine" options, add members
            // Remove old member options first
            const toRemove = [];
            for (let i = 0; i < filterSel.options.length; i++) {
                if (!['all', 'me', 'unassigned'].includes(filterSel.options[i].value)) {
                    toRemove.push(i);
                }
            }
            // Remove from end to preserve indices
            toRemove.reverse().forEach(i => filterSel.remove(i));
            
            // Add current members
            const allMembers = getAllMemberNames();
            allMembers.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                filterSel.appendChild(opt);
            });
        }

        function getAllMemberNames() {
            return ASSIGNEES.map(m => m.name);
        }

        // ============================================================
        // TASK RENDERING MIT FILTER
        // ============================================================

        function renderTasks() {
            ['todo', 'inprogress', 'done'].forEach(col => {
                const list = document.querySelector(`#${col} .task-list`);
                const cnt = document.getElementById(`${col}-count`);
                list.innerHTML = '';
                
                let filteredTasks = tasksData[col];
                if (currentFilter !== 'all') {
                    filteredTasks = tasksData[col].filter(task => {
                        if (currentFilter === 'me') {
                            return task.assignee === 'Max'; // Annahme: Max ist der aktuelle Benutzer
                        } else if (currentFilter === 'unassigned') {
                            return !task.assignee || task.assignee === '';
                        } else {
                            return task.assignee === currentFilter;
                        }
                    });
                }
                
                filteredTasks.forEach(task => {
                    list.appendChild(createTaskElement(task, col));
                });
                cnt.textContent = currentFilter === 'all' ? tasksData[col].length : filteredTasks.length;
            });
        }

        function createTaskElement(task, colId) {
            const d = document.createElement('div');
            d.className = `task category-${task.category}`;
            d.draggable = true;
            d.dataset.id = task.id;
            d.dataset.column = colId;
            
            // Check if overdue
            const today = new Date();
            today.setHours(0,0,0,0);
            const dueDate = task.dueDate ? new Date(task.dueDate) : null;
            const isOverdue = dueDate && dueDate < today && colId !== 'done';
            const isSoon = dueDate && !isOverdue && (dueDate - today) <= 3 * 24 * 60 * 60 * 1000;
            
            if (isOverdue) d.classList.add('overdue');
            
            let metaHTML = '';
            if (task.assignee) {
                const member = ASSIGNEES.find(m => m.name === task.assignee);
                const color = member ? member.color : '#667eea';
                metaHTML += `<span class="assignee-tag" style="background:${color}">👤 ${task.assignee}</span>`;
            }
            if (task.dueDate) {
                const dateLabel = formatDate(task.dueDate);
                let dateClass = 'task-due-date';
                if (isOverdue) dateClass += ' overdue';
                else if (isSoon) dateClass += ' soon';
                metaHTML += `<span class="${dateClass}">📅 ${dateLabel}</span>`;
            }
            
            d.innerHTML = `
                <div class="task-actions">
                    <button class="task-btn" onclick="event.stopPropagation(); openEditModal(${task.id},'${colId}')" title="Bearbeiten">✏️</button>
                    <button class="task-btn delete" onclick="event.stopPropagation(); confirmDelete(${task.id},'${colId}')" title="Löschen">🗑️</button>
                </div>
                <div class="task-header">
                    <span class="task-icon">${task.icon || '📋'}</span>
                    <div class="task-content">
                        <span class="task-category category-${task.category}">${getCategoryLabel(task.category)}</span>
                        <h3>${task.title}</h3>
                        <p>${task.description || ''}</p>
                    </div>
                </div>
                <div class="task-meta">${metaHTML}</div>`;
            
            d.addEventListener('dragstart', handleDragStart);
            d.addEventListener('dragend', handleDragEnd);
            d.addEventListener('click', () => openEditModal(task.id, colId));
            return d;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            const today = new Date();
            today.setHours(0,0,0,0);
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            
            if (d.toDateString() === today.toDateString()) return 'Heute';
            if (d.toDateString() === tomorrow.toDateString()) return 'Morgen';
            
            return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
        }

        function getCategoryLabel(cat) {
            const labels = { 
                haushalt: 'Haushalt', 
                einkauf: 'Einkauf', 
                pflege: 'Pflege', 
                fahrrad: 'Fahrrad',
                auto: 'Auto',
                reisen: 'Reisen'
            };
            return labels[cat] || cat;
        }

        // ============================================================
        // DRAG & DROP
        // ============================================================

        function handleDragStart(e) {
            draggedItem = e.target.closest('.task');
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', draggedItem.dataset.id);
            e.dataTransfer.setData('text/column', draggedItem.dataset.column);
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.task-list').forEach(l => l.classList.remove('drag-over'));
        }

        function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }

        function handleDrop(e, targetCol) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            if (!draggedItem) return;
            const tid = parseInt(draggedItem.dataset.id);
            const srcCol = draggedItem.dataset.column;
            if (srcCol === targetCol) return;
            const idx = tasksData[srcCol].findIndex(t => t.id === tid);
            if (idx !== -1) {
                const task = tasksData[srcCol].splice(idx, 1)[0];
                tasksData[targetCol].push(task);
                renderTasks();
                saveToStorage();
            }
        }

        // ============================================================
        // TASK ACTIONS
        // ============================================================

        function addTask(colId) {
            const cats = ['haushalt', 'einkauf', 'pflege', 'fahrrad'];
            const titles = {
                haushalt: ['Badezimmer reinigen', 'Fenster putzen', 'Böden wischen', 'Staub wischen'],
                einkauf: ['Getränke kaufen', 'Haushaltswaren', 'Drogerieartikel', 'Obst & Gemüse'],
                pflege: ['Hemden bügeln', 'Bettwäsche wechseln', 'Schuhe putzen', 'Kleidung sortieren'],
                fahrrad: ['Reifen aufpumpen', 'Kette ölen', 'Beleuchtung prüfen', 'Bremsen justieren']
            };
            const cat = cats[Math.floor(Math.random() * cats.length)];
            const title = titles[cat][Math.floor(Math.random() * titles[cat].length)];
            const newTask = {
                id: Date.now(),
                category: cat,
                title: title,
                description: '',
                assignee: '',
                icon: ICONS[Math.floor(Math.random() * ICONS.length)],
                dueDate: ''
            };
            tasksData[colId].push(newTask);
            renderTasks();
            saveToStorage();
            openEditModal(newTask.id, colId);
        }

        function openEditModal(taskId, colId) {
            const task = tasksData[colId].find(t => t.id === taskId);
            if (!task) return;
            document.getElementById('editTaskId').value = taskId;
            document.getElementById('editColumn').value = colId;
            document.getElementById('editTitle').value = task.title;
            document.getElementById('editDescription').value = task.description || '';
            document.getElementById('editAssignee').value = task.assignee || '';
            document.getElementById('editCategory').value = task.category;
            document.getElementById('editDueDate').value = task.dueDate || '';
            
            if (task.icon) {
                const r = document.querySelector(`input[name="taskIcon"][value="${task.icon}"]`);
                if (r) r.checked = true;
            } else {
                document.querySelector('input[name="taskIcon"]').checked = true;
            }
            document.getElementById('editModal').classList.add('active');
            document.getElementById('editTitle').focus();
        }

        function closeModal() { document.getElementById('editModal').classList.remove('active'); }

        function deleteCurrentTask() {
            const tid = parseInt(document.getElementById('editTaskId').value);
            const colId = document.getElementById('editColumn').value;
            if (confirm('Möchtest du diese Aufgabe wirklich löschen?')) {
                const idx = tasksData[colId].findIndex(t => t.id === tid);
                if (idx !== -1) { tasksData[colId].splice(idx, 1); renderTasks(); saveToStorage(); closeModal(); }
            }
        }

        function confirmDelete(taskId, colId) {
            if (confirm('Möchtest du diese Aufgabe wirklich löschen?')) {
                const idx = tasksData[colId].findIndex(t => t.id === taskId);
                if (idx !== -1) { tasksData[colId].splice(idx, 1); renderTasks(); saveToStorage(); }
            }
        }

        document.getElementById('editForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const tid = parseInt(document.getElementById('editTaskId').value);
            const colId = document.getElementById('editColumn').value;
            const selIcon = document.querySelector('input[name="taskIcon"]:checked');
            const task = tasksData[colId].find(t => t.id === tid);
            if (task) {
                task.title = document.getElementById('editTitle').value.trim();
                task.description = document.getElementById('editDescription').value.trim();
                task.assignee = document.getElementById('editAssignee').value;
                task.category = document.getElementById('editCategory').value;
                task.dueDate = document.getElementById('editDueDate').value;
                task.icon = selIcon ? selIcon.value : '📋';
                renderTasks();
                saveToStorage();
                closeModal();
            }
        });

        document.getElementById('editModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

        // ============================================================
        // FILTER
        // ============================================================

        function applyFilter() {
            currentFilter = document.getElementById('filterSelect').value;
            renderTasks();
            try { localStorage.setItem('kanban-filter-v3', currentFilter); } catch (e) {}
        }

        // ============================================================
        // SETTINGS MODAL
        // ============================================================

        function openSettingsModal() {
            renderMemberList();
            document.getElementById('darkModeToggle').checked = isDarkMode;
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        document.getElementById('settingsModal').addEventListener('click', function(e) { 
            if (e.target === this) closeSettingsModal(); 
        });

        function renderMemberList() {
            const list = document.getElementById('memberList');
            list.innerHTML = '';
            ASSIGNEES.forEach((member, idx) => {
                list.innerHTML += `
                    <div class="member-item">
                        <input type="color" class="member-color" value="${member.color}" onchange="updateMemberColor(${idx}, this.value)">
                        <span class="member-name">${member.name}</span>
                        <button class="member-delete" onclick="deleteMember(${idx})">✕</button>
                    </div>`;
            });
        }

        function updateMemberColor(idx, color) {
            ASSIGNEES[idx].color = color;
        }

        function deleteMember(idx) {
            ASSIGNEES.splice(idx, 1);
            renderMemberList();
        }

        function addNewMember() {
            const nameInput = document.getElementById('newMemberName');
            const colorInput = document.getElementById('newMemberColor');
            const name = nameInput.value.trim();
            if (name) {
                ASSIGNEES.push({ name: name, color: colorInput.value });
                nameInput.value = '';
                renderMemberList();
            }
        }

        function toggleDarkMode() {
            isDarkMode = document.getElementById('darkModeToggle').checked;
            document.body.classList.toggle('dark-mode', isDarkMode);
            try { localStorage.setItem('kanban-darkmode-v3', JSON.stringify(isDarkMode)); } catch (e) {}
        }

        function saveSettings() {
            try {
                localStorage.setItem('kanban-members-v3', JSON.stringify(ASSIGNEES));
                localStorage.setItem('kanban-darkmode-v3', JSON.stringify(isDarkMode));
            } catch (e) {}
            buildAssigneeSelect();
            renderTasks();
            closeSettingsModal();
        }

        function resetSettings() {
            if (confirm('Alle Einstellungen zurücksetzen?')) {
                localStorage.removeItem('kanban-members-v3');
                localStorage.removeItem('kanban-darkmode-v3');
                ASSIGNEES = [
                    { name: 'Max', color: '#e74c3c' },
                    { name: 'Anna', color: '#3498db' },
                    { name: 'Tom', color: '#27ae60' },
                    { name: 'Lisa', color: '#9b59b6' },
                    { name: 'Familie', color: '#f39c12' },
                    { name: 'Gemeinsam', color: '#1abc9c' }
                ];
                isDarkMode = false;
                document.body.classList.remove('dark-mode');
                document.getElementById('darkModeToggle').checked = false;
                buildAssigneeSelect();
                renderMemberList();
            }
        }

        // ============================================================
        // STORAGE
        // ============================================================

        function saveToStorage() {
            try { localStorage.setItem('kanban-tasks-v3', JSON.stringify(tasksData)); } catch (e) {}
        }

        function loadFromStorage() {
            // Load tasks
            try {
                const saved = localStorage.getItem('kanban-tasks-v3');
                if (saved) {
                    const p = JSON.parse(saved);
                    if (p.todo && p.inprogress && p.done) {
                        tasksData.todo = p.todo;
                        tasksData.inprogress = p.inprogress;
                        tasksData.done = p.done;
                    }
                }
            } catch (e) {}
            
            // Load members
            try {
                const savedMembers = localStorage.getItem('kanban-members-v3');
                if (savedMembers) {
                    const m = JSON.parse(savedMembers);
                    if (Array.isArray(m) && m.length > 0) {
                        ASSIGNEES = m;
                    }
                }
            } catch (e) {}
            
            // Load dark mode
            try {
                const savedDark = localStorage.getItem('kanban-darkmode-v3');
                if (savedDark) {
                    isDarkMode = JSON.parse(savedDark);
                    if (isDarkMode) document.body.classList.add('dark-mode');
                }
            } catch (e) {}
            
            // Load filter
            try {
                const savedFilter = localStorage.getItem('kanban-filter-v3');
                if (savedFilter) {
                    currentFilter = savedFilter;
                    document.getElementById('filterSelect').value = currentFilter;
                }
            } catch (e) {}
        }

        // ============================================================
        // INIT
        // ============================================================

        buildIconPicker();
        buildAssigneeSelect();
        loadFromStorage();
        renderTasks();
    </script>
</body>
</html>
